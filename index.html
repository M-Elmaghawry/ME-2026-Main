    <script>
      // Restore path from query param set by 404.html
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }

        var search = location.search;
        if (search && search.indexOf('?p=') === 0) {
          var decoded = search.slice(1)
            .split('&')
            .map(function(s) { return s.replace(/~and~/g, '&'); });
          var path = decoded[0].slice(2);
          var query = decoded.slice(1).join('&');
          query = query ? ('?' + query) : '';
          window.history.replaceState(null, null, path + query + location.hash);
        }
      })();
    </script>
